name: NOUS Behavioral Diff

on:
  pull_request:
    paths:
      - '**.nous'

permissions:
  pull-requests: write
  contents: read

jobs:
  nous-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install lark pydantic httpx

      - name: Find changed .nous files
        id: changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100" \
            | python3 -c "
          import json, sys
          files = json.load(sys.stdin)
          nous = [f['filename'] for f in files if f['filename'].endswith('.nous') and f['status'] != 'removed']
          with open('/tmp/changed_nous_files.txt', 'w') as fh:
              fh.write('\n'.join(nous))
          print(f'Found {len(nous)} changed .nous files')
          "
          count=$(grep -c . /tmp/changed_nous_files.txt 2>/dev/null || echo 0)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          cat /tmp/changed_nous_files.txt

      - name: Run NOUS diff
        if: steps.changed.outputs.count != '0'
        env:
          PYTHONPATH: ${{ github.workspace }}/head
        run: |
          mkdir -p /tmp/nous_diffs
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            base_file="base/$file"
            head_file="head/$file"
            slug=$(echo "$file" | tr '/' '_' | sed 's/\.nous$//')
            if [ -f "$base_file" ] && [ -f "$head_file" ]; then
              python head/cli.py diff "$base_file" "$head_file" --json > "/tmp/nous_diffs/${slug}.json" 2>&1 || true
            elif [ -f "$head_file" ]; then
              echo '{"status":"new_file","file":"'"$file"'"}' > "/tmp/nous_diffs/${slug}.json"
            fi
          done < /tmp/changed_nous_files.txt

      - name: Generate PR comment
        if: steps.changed.outputs.count != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python head/.github/scripts/pr_comment_generator.py \
            --diff-dir /tmp/nous_diffs \
            --changed-files /tmp/changed_nous_files.txt

      - name: No .nous changes
        if: steps.changed.outputs.count == '0'
        run: echo "No .nous files changed."
