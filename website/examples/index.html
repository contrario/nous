<script>
function hl(c){return c.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/(#[^\n]*)/g,'<span class="cm">$1</span>').replace(/(["'`])((?:(?!\1).)*)\1/g,'<span class="st">$1$2$1</span>').replace(/\b(world|soul|message|nervous_system|mind|senses|memory|instinct|heal|dna|speak|listen|guard|remember|sense|law|heartbeat|topology|let|on|if|else|import|from|test|assert|evolve|for|in|evolution|perception|schedule|fitness|mutate|strategy|survive_if|rollback_if)\b/g,'<span class="kw">$1</span>').replace(/\b(string|int|float|bool|timestamp|duration|currency|SoulRef|ToolRef)\b/g,'<span class="ty">$1</span>').replace(/(\$[\d.]+|retry|exponential|linear|hibernate|fallback|sleep|alert|lower|wake|wake_all|BUY|HOLD|SELL|true|false|null|self)\b/g,'<span class="sp">$1</span>').replace(/\b(\d+\.?\d*)\b/g,'<span class="nu">$1</span>')}

const EXAMPLES=[{id:"conscious-team",title:"Conscious Research Team",desc:"Fully autonomous 2-soul team with all 12 subsystems: consciousness for goal-tracking, metabolism for energy management, symbiosis for shared memory, telemetry, and the complete defense stack.",file:"conscious_team.nous",category:"Consciousness",color:"#e05252",souls:2,messages:1,laws:1,features:["Consciousness","Metabolism","Symbiosis","Telemetry","Retirement"],code:`world ResearchLab {
    law cost_ceiling = $5.00 per cycle
    heartbeat = 10s
    telemetry {
        enabled: true
        exporter: jsonl
        sample_rate: 1.0
        trace_senses: true
        trace_llm: true
    }
}

soul Researcher {
    mind: claude-3-haiku @ Tier0A
    senses: [http_get, arxiv_search, check_dream_cache]

    memory {
        discoveries: 0
        accuracy: 0.0
        total_cost: 0.0
    }

    instinct {
        let cached = sense check_dream_cache(topic: "quantum computing")
        guard cached == null else speak cached
        let papers = sense arxiv_search(query: "quantum error correction", max: 5)
        speak "Found {papers.count} papers. Analyzing..."
    }

    dna {
        search_depth: 5 [1..20]
        creativity: 0.7 [0.1..1.0]
    }

    heal {
        on api_error -> retry 3
        on timeout -> fallback "Using cached results"
    }

    mitosis {
        max_clones: 3
        trigger: queue_depth > 10
        clone_tier: Cerebras
        retire_trigger: queue_depth < 3
        retire_cooldown: 120s
        min_clones: 1
    }

    immune_system {
        antibody_lifespan: 1h
        max_antibodies: 50
        share_with_clones: true
    }

    dream_system {
        trigger_idle_sec: 30
        max_cache: 20
        speculation_depth: 3
        dream_mind: gemma-3 @ Cerebras
    }

    symbiosis {
        bond_with: [Analyst]
        shared_memory: [discoveries, accuracy]
        sync_interval: 10s
        evolve_together: true
    }

    metabolism {
        max_energy: 100
        energy_per_cycle: 8
        recovery_rate: 3
        fatigue_tier: Cerebras
        hibernate_threshold: 15
        recovery_idle_sec: 20
    }

    consciousness {
        goals: [maximize_discoveries, improve_accuracy, reduce_cost]
        reflect_every: 5
        self_model: true
        goal_threshold: 0.8
        introspection_depth: 3
    }
}

soul Analyst {
    mind: deepseek-chat @ DeepSeek
    listen: Researcher

    memory {
        discoveries: 0
        accuracy: 0.0
    }

    instinct {
        guard message != null else sleep 5s
        speak "Analysis of: {message}"
    }

    symbiosis {
        bond_with: [Researcher]
        shared_memory: [discoveries, accuracy]
        sync_interval: 10s
    }

    metabolism {
        max_energy: 80
        energy_per_cycle: 5
        recovery_rate: 4
        fatigue_tier: Cerebras
        hibernate_threshold: 10
    }

    consciousness {
        goals: [improve_accuracy]
        reflect_every: 10
        self_model: false
        goal_threshold: 0.7
    }
}

Researcher -> Analyst
`},{id:"soul-biology",title:"Soul Biology Pipeline",desc:"3-soul system demonstrating all biological subsystems: Mitosis (self-replication under load), Immune System (LLM-generated antibodies), and Agent Dreaming (speculative pre-computation). The complete defense architecture.",file:"immune_test.nous",category:"Biology",color:"#e05252",souls:3,messages:2,laws:1,features:["Mitosis","Immune System","Agent Dreaming","Lucid Dreaming"],code:`world Laboratory {
    law cost_ceiling = $0.50 per cycle
    heartbeat = 10s
}

message DataPacket {
    source: string
    payload: string
    confidence: float = 0.0
}

message ProcessedResult {
    status: string
    output: string
}

soul Collector {
    mind: claude-sonnet @ Tier0A
    senses: [http_get, check_dream_cache]

    memory {
        collected: int = 0
    }

    mitosis {
        trigger: queue_depth > 10
        max_clones: 2
        cooldown: 60s
        clone_tier: Groq
        verify: true
    }

    immune_system {
        adaptive_recovery: true
        share_with_clones: true
        antibody_lifespan: 3600s
    }

    dream_system {
        enabled: true
        trigger_idle_sec: 10
        dream_mind: deepseek-chat @ Tier1
        max_cache: 10
        speculation_depth: 3
    }

    instinct {
        let cached = sense check_dream_cache(query: "prediction")
        let raw = sense http_get(url: "https://api.example.com/feed")
        remember collected += 1
        speak DataPacket(source: "collector", payload: raw, confidence: 0.85)
    }

    heal {
        on timeout => retry(3, exponential)
        on api_error => retry(2, fixed) then alert(ops)
    }
}

soul Processor {
    mind: deepseek-v3 @ Tier1
    senses: [http_post]
    memory { processed: int = 0 }

    immune_system {
        adaptive_recovery: true
        share_with_clones: true
        antibody_lifespan: 1800s
    }

    instinct {
        let msg = listen Collector::DataPacket
        remember processed += 1
        speak ProcessedResult(status: "ok", output: msg.payload)
    }

    heal {
        on timeout => retry(2, fixed)
    }
}

soul Reporter {
    mind: llama-8b @ Cerebras
    senses: [http_post]
    memory { reports: int = 0 }

    instinct {
        let result = listen Processor::ProcessedResult
        remember reports += 1
        sense http_post(url: "https://hooks.slack.com/notify", body: result.output)
    }

    heal {
        on timeout => retry(1, fixed)
    }
}

nervous_system {
    Collector -> Processor -> Reporter
}`},

{id:"gate-alpha",title:"GateAlpha Trading Pipeline",desc:"4-soul crypto trading system with Scout, Quant, Hunter, and Monitor. Includes evolution scheduling, Telegram perception, and paper trading safeguards.",file:"gate_alpha.nous",category:"Trading",color:"var(--orange)",souls:4,messages:2,laws:5,features:["Evolution","Perception","DNA","Paper Trading"],code:`world GateAlpha {
    law CostCeiling = $0.10 per cycle
    law MaxLatency = 30s
    law NoLiveTrading = true
    law RequireApproval = true
    law MaxPositionSize = $500
    law MaxDailyLoss = $100
    heartbeat = 5m
}

message Signal {
    pair: string
    score: float
    rsi: float?
    source: SoulRef
}

message Decision {
    action: string
    size: float
    risk: float
    sl_pct: float
    tp_pct: float
}

soul Scout {
    mind: deepseek-r1 @ Tier1
    senses: [gate_alpha_scan, fetch_rsi, ddgs_search]
    memory {
        signals: [Signal] = []
        rejected: [string] = []
        scan_count: int = 0
    }
    instinct {
        let tokens = sense gate_alpha_scan()
        let filtered = tokens.where(volume_24h > 50000)
        for token in filtered {
            let rsi = sense fetch_rsi(token.pair)
            guard rsi < 70
            speak Signal(pair: token.pair, score: token.composite_score, rsi: rsi, source: self)
        }
        remember scan_count += 1
    }
    dna {
        volume_threshold: 50000 ~ [10000, 200000]
        rsi_ceiling: 70 ~ [60, 80]
        temperature: 0.3 ~ [0.1, 0.9]
    }
    heal {
        on timeout => retry(2, exponential)
        on api_error => sleep 1s
        on hallucination => lower(temperature, 0.1) then retry
    }
}

soul Quant {
    mind: claude-haiku @ Tier0A
    senses: [calculate_kelly, backtest_pair]
    memory { risk_score: float = 0 }
    instinct {
        let signal = listen Scout::Signal
        let kelly = sense calculate_kelly(signal)
        let risk = 1 - kelly.edge
        speak Decision(action: if kelly.edge > 0.15 { BUY } else { HOLD }, size: kelly.fraction * 0.5, risk: risk, sl_pct: 8, tp_pct: 25)
    }
    heal { on timeout => retry(3, exponential) }
}

soul Hunter {
    mind: deepseek-r1 @ Tier1
    senses: [execute_paper_trade, check_balance]
    memory { last_trade: string = "" }
    instinct {
        let decision = listen Quant::Decision
        guard decision.action == BUY
        sense execute_paper_trade(decision)
    }
    heal {
        on timeout => retry(2, exponential)
        on budget_exceeded => hibernate until next_cycle
    }
}

soul Monitor {
    mind: gemini-flash @ Tier2
    senses: [check_positions, send_telegram]
    memory { alert_count: int = 0 }
    instinct {
        let signal = listen Scout::Signal
        sense send_telegram(chat: world.config.telegram_chat, text: "scout signal received")
        remember alert_count += 1
    }
    heal { on timeout => retry(1, exponential) }
}

nervous_system {
    Scout -> Quant
    Quant -> Hunter
    Scout -> Monitor
}

evolution {
    schedule: 3:00 AM
    fitness: langfuse(quality_score)
    mutate Scout.dna {
        strategy: genetic(population: 3, generations: 2)
        survive_if: fitness > parent.fitness
        rollback_if: any_law_violated
    }
}

perception {
    on telegram("/scan") => wake Scout
    on cron("*/5 * * * *") => wake_all
    on system_error => alert Telegram
}`},
{id:"compiler",title:"Self-Hosting Compiler",desc:"The NOUS compiler written in NOUS. 3-soul pipeline: Reader scans files, Analyzer validates and typechecks, Emitter generates code. Bootstrap proof.",file:"compiler.nous",category:"Meta",color:"var(--gold)",souls:3,messages:3,laws:1,features:["Self-Hosting","9 Compiler Senses","Bootstrap"],code:`# NOUS Self-Hosting Compiler — Αυτομεταγλώττιση
# A NOUS program that compiles other NOUS programs.

world NousCompiler {
    law cost_ceiling = $1.00 per cycle
    heartbeat = 60s
}

message SourceBundle {
    path: string
    source: string
    lines: int = 0
}

message AnalysisResult {
    path: string
    source: string
    world_name: string = "Unknown"
    soul_count: int = 0
    message_count: int = 0
    route_count: int = 0
    valid: bool = false
    type_ok: bool = false
    errors: string = ""
    target: string = "python"
}

message CompileResult {
    path: string
    output_path: string = ""
    target: string = "python"
    success: bool = false
    code_lines: int = 0
    compile_check: bool = false
    error: string = ""
}

soul Reader {
    mind: claude-sonnet @ Tier0A
    senses: [file_read, file_list]
    memory {
        files_read: int = 0
        last_file: string = ""
        target: string = "python"
    }
    instinct {
        let listing = sense file_list(directory: ".", pattern: "*.nous")
        let files = listing.files
        guard files != null
        for f in files {
            let result = sense file_read(path: f)
            if result.ok == true {
                remember files_read += 1
                remember last_file = f
                speak SourceBundle(path: f, source: result.content, lines: result.lines)
            }
        }
    }
    heal {
        on timeout => retry(3, exponential)
        on api_error => retry(2, exponential)
    }
}

soul Analyzer {
    mind: claude-sonnet @ Tier0A
    senses: [nous_parse, nous_validate, nous_typecheck]
    memory {
        analyzed: int = 0
        valid_count: int = 0
        invalid_count: int = 0
    }
    instinct {
        let bundle = listen Reader::SourceBundle
        let parsed = sense nous_parse(source: bundle.source)
        if parsed.ok == false {
            remember invalid_count += 1
            speak AnalysisResult(path: bundle.path, source: bundle.source, valid: false, errors: parsed.error)
        }
        if parsed.ok == true {
            let validated = sense nous_validate(source: bundle.source)
            if validated.ok == false {
                remember invalid_count += 1
                speak AnalysisResult(path: bundle.path, source: bundle.source, valid: false, errors: validated.errors)
            }
            if validated.ok == true {
                let typed = sense nous_typecheck(source: bundle.source)
                remember analyzed += 1
                remember valid_count += 1
                speak AnalysisResult(path: bundle.path, source: bundle.source, world_name: parsed.world, soul_count: parsed.soul_count, message_count: parsed.message_count, route_count: parsed.route_count, valid: true, type_ok: typed.ok, target: "python")
            }
        }
    }
    heal {
        on timeout => retry(3, exponential)
        on api_error => retry(2, exponential)
    }
}

soul Emitter {
    mind: claude-sonnet @ Tier0A
    senses: [nous_codegen, file_write]
    memory {
        emitted: int = 0
        errors: int = 0
        total_lines: int = 0
    }
    instinct {
        let analysis = listen Analyzer::AnalysisResult
        guard analysis.valid == true
        let gen = sense nous_codegen(source: analysis.source, target: analysis.target)
        if gen.ok == true {
            let out_path = analysis.path
            let written = sense file_write(path: out_path, content: gen.code)
            if written.ok == true {
                remember emitted += 1
                remember total_lines += gen.lines
                speak CompileResult(path: analysis.path, output_path: out_path, target: analysis.target, success: true, code_lines: gen.lines, compile_check: gen.compile_check)
            }
        }
        if gen.ok == false {
            remember errors += 1
            speak CompileResult(path: analysis.path, success: false, error: gen.error)
        }
    }
    heal {
        on timeout => retry(2, exponential)
        on api_error => retry(2, exponential)
    }
}

nervous_system {
    Reader -> Analyzer -> Emitter
}`},
{id:"research",title:"Deep Research Pipeline",desc:"4-soul research system: Searcher finds sources, Analyst extracts key points, Synthesizer generates reports, Publisher distributes via Telegram and Notion.",file:"research_pipeline.nous",category:"Research",color:"var(--blue)",souls:4,messages:3,laws:2,features:["Evolution","Multi-Source","Auto-Publish"],code:`world ResearchPipeline {
    law CostCeiling = $0.50 per cycle
    law MaxLatency = 60s
    heartbeat = 30m
}

message Query {
    topic: string
    depth: int
    requester: string
}

message Finding {
    title: string
    summary: string
    relevance: float
    source_url: string
    source: SoulRef
}

message Synthesis {

    findings_count: int
    report: string

}

soul Searcher {
    mind: deepseek-r1 @ Tier1
    senses: [ddgs_search, arxiv_search, scholar_search]
    memory {
        queries_processed: int = 0
        sources_found: int = 0
    }
    instinct {
        let query = listen Coordinator::Query
        let web = sense ddgs_search(query.topic)
        for result in web {
            guard result.relevance > 0.6
            speak Finding(title: result.title, summary: result.snippet, relevance: result.relevance, source_url: result.url, source: self)
        }
        remember queries_processed += 1
        remember sources_found += web.length
    }
    dna {
        relevance_threshold: 0.6 ~ [0.3, 0.9]
        max_results: 10 ~ [5, 30]
    }
    heal {
        on timeout => retry(2, exponential)
        on api_error => fallback(ddgs_search)
        on rate_limit => sleep 1 cycle
    }
}

soul Analyst {
    mind: claude-sonnet @ Tier0A
    senses: [fetch_page, extract_text]
    memory { analyzed: int = 0 }
    instinct {
        let finding = listen Searcher::Finding
        guard finding.relevance > 0.7
        let content = sense fetch_page(finding.source_url)
        let analysis = sense extract_text(content.body)
        speak Finding(title: finding.title, summary: analysis.key_points, relevance: finding.relevance, source_url: finding.source_url, source: self)
        remember analyzed += 1
    }
    dna { analysis_depth: 0.7 ~ [0.5, 1.0] }

        on timeout => retry(2, exponential)
        on api_error => sleep 1 cycle
    }

soul Synthesizer {
    mind: claude-sonnet @ Tier0A
    senses: [generate_report]
    memory { reports_generated: int = 0 }
    instinct {
        let finding = listen Analyst::Finding
        let report = sense generate_report(finding.title, finding.summary)
        speak Synthesis(topic: finding.title, findings_count: 1, report: report.text, confidence: report.confidence)
        remember reports_generated += 1
    }
    heal {
        on timeout => retry(2, exponential)
        on api_error => lower(temperature, 0.1) then retry
    }
}

soul Publisher {

    }
    heal {
        on timeout => retry(2, exponential)
        on api_error => fallback(send_telegram)
    }
}

nervous_system {
    Searcher -> Analyst
    Analyst -> Synthesizer
    Synthesizer -> Publisher
}`},

const CATS=["All",...new Set(EXAMPLES.map(e=>e.category))];
let activeFilter="All";

function renderFilters(){
  const el=document.getElementById('filters');
  CATS.forEach(c=>{el.innerHTML+=`<button class="filter-btn${c==='All'?' active':''}" onclick="setFilter('${c}')">${c}</button>`;});
}

function setFilter(cat){
  activeFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>{b.classList.toggle('active',b.textContent===cat);});
  renderGrid();
}

function renderGrid(){
  const grid=document.getElementById('grid');
  const items=activeFilter==='All'?EXAMPLES:EXAMPLES.filter(e=>e.category===activeFilter);
  grid.innerHTML=items.map(e=>`
    <div class="ex-card" id="card-${e.id}">
      <div class="ex-card-top" onclick="toggleCode('${e.id}')">
        <div class="ex-head">
          <span class="ex-badge" style="background:${e.color}15;border:1px solid ${e.color}30;color:${e.color}">${e.category}</span>
          <span class="ex-title">${e.title}</span>
        </div>
        <div class="ex-desc">${e.desc}</div>
        <div class="ex-meta">
          <span class="ex-meta-item">Souls: <span class="ex-meta-val">${e.souls}</span></span>
          <span class="ex-meta-item">Messages: <span class="ex-meta-val">${e.messages}</span></span>
          <span class="ex-meta-item">Laws: <span class="ex-meta-val">${e.laws}</span></span>
          ${e.features.map(f=>`<span class="ex-meta-item" style="color:${e.color};font-size:10.5px;letter-spacing:0.5px">${f}</span>`).join('')}
        </div>
      </div>
      <div class="ex-code" id="code-${e.id}">
        <div class="ex-code-header">
          <span class="ex-code-name">${e.file}</span>
          <div class="ex-code-actions">
            <button class="ex-copy-btn" onclick="copyCode('${e.id}',this,event)">Copy</button>
            <button class="ex-toggle" onclick="toggleCode('${e.id}',event)">Collapse</button>
          </div>
        </div>
        <pre><code>${hl(e.code)}</code></pre>
      </div>
    </div>
  `).join('');
}

function toggleCode(id,ev){
  if(ev)ev.stopPropagation();
  document.getElementById('code-'+id).classList.toggle('open');
}

function copyCode(id,btn,ev){
  ev.stopPropagation();
  const ex=EXAMPLES.find(e=>e.id===id);
  navigator.clipboard?.writeText(ex.code);
  btn.textContent='Copied ✓';btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);
}

renderFilters();
renderGrid();
