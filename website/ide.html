<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOUS IDE — Νοῦς</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#05070e;--bg2:#0a0e1c;--card:rgba(10,14,28,0.85);
--gold:#c9a554;--gold-d:rgba(201,165,84,0.15);--gold-b:rgba(201,165,84,0.25);--gold-t:rgba(201,165,84,0.08);
--red:#e05252;--red-d:rgba(224,82,82,0.12);
--green:#4ade80;--green-d:rgba(74,222,128,0.12);
--amber:#f59e0b;--amber-d:rgba(245,158,11,0.12);
--blue:#60a5fa;--blue-d:rgba(96,165,250,0.12);
--purple:#a78bfa;--cyan:#22d3ee;
--t:#e2e8f0;--td:#94a3b8;--t3:#64748b;
--mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;--serif:'Playfair Display',serif;
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--sans);overflow:hidden}

.ide-shell{display:flex;flex-direction:column;height:100vh}

.ide-header{
display:flex;align-items:center;justify-content:space-between;
padding:0 20px;height:48px;min-height:48px;
background:rgba(5,7,14,0.95);border-bottom:1px solid rgba(201,165,84,0.12);
}
.ide-logo{display:flex;align-items:center;gap:10px}
.ide-logo-n{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--gold);letter-spacing:0.06em}
.ide-logo-sub{font-family:var(--mono);font-size:11px;color:var(--td);letter-spacing:0.04em}
.ide-version{font-family:var(--mono);font-size:10px;color:var(--t3);background:rgba(255,255,255,0.04);padding:3px 8px;border-radius:4px}

.tab-bar{
display:flex;gap:0;padding:0 20px;height:38px;min-height:38px;
background:rgba(5,7,14,0.9);border-bottom:1px solid rgba(255,255,255,0.06);
}
.tab-btn{
font-family:var(--mono);font-size:12px;letter-spacing:0.03em;
padding:0 18px;height:38px;border:none;background:transparent;color:var(--td);
cursor:pointer;position:relative;transition:color 0.2s;
display:flex;align-items:center;gap:6px;
}
.tab-btn:hover{color:var(--t)}
.tab-btn.active{color:var(--gold)}
.tab-btn.active::after{
content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
background:var(--gold);border-radius:2px 2px 0 0;
}
.tab-icon{font-size:13px;opacity:0.7}

.tab-panels{flex:1;overflow:hidden;position:relative}
.tab-panel{
position:absolute;inset:0;overflow-y:auto;padding:24px;
display:none;
}
.tab-panel.active{display:flex;flex-direction:column;height:100%}

.placeholder{
display:flex;flex-direction:column;align-items:center;justify-content:center;
height:100%;gap:16px;opacity:0.4;
}
.placeholder-icon{font-size:48px}
.placeholder-text{font-family:var(--mono);font-size:14px;color:var(--td)}

.editor-wrap{display:flex;gap:0;height:100%}
.editor-area{flex:1;display:flex;flex-direction:column}
.editor-toolbar{
display:flex;align-items:center;gap:8px;padding:8px 12px;
border-bottom:1px solid rgba(255,255,255,0.06);
}
.editor-toolbar-btn{
font-family:var(--mono);font-size:11px;padding:5px 12px;
border:1px solid rgba(201,165,84,0.2);border-radius:4px;
background:rgba(201,165,84,0.06);color:var(--gold);cursor:pointer;
transition:all 0.2s;
}
.editor-toolbar-btn:hover{background:rgba(201,165,84,0.15);border-color:rgba(201,165,84,0.4)}
.editor-file{font-family:var(--mono);font-size:11px;color:var(--td);margin-left:auto}
#monaco-container{flex:1;width:100%;min-height:200px}
.code-input{
flex:1;width:100%;padding:16px;
background:transparent;border:none;outline:none;resize:none;
font-family:var(--mono);font-size:13px;line-height:1.7;color:var(--t);
tab-size:4;
}
.editor-output{
width:340px;border-left:1px solid rgba(255,255,255,0.06);
display:flex;flex-direction:column;
}
.output-header{
font-family:var(--mono);font-size:11px;color:var(--td);
padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.06);
text-transform:uppercase;letter-spacing:0.06em;
}
.output-content{
flex:1;padding:12px;font-family:var(--mono);font-size:12px;
color:var(--green);overflow-y:auto;line-height:1.6;
}

.diff-wrap{max-width:1100px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:18px}

.verdict{border-radius:12px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.verdict.brk{background:linear-gradient(135deg,rgba(224,82,82,0.08) 0%,rgba(10,14,28,0.95) 60%);border:1px solid rgba(224,82,82,0.3)}
.verdict.safe{background:linear-gradient(135deg,rgba(74,222,128,0.08) 0%,rgba(10,14,28,0.95) 60%);border:1px solid rgba(74,222,128,0.3)}
.v-title{font-family:var(--serif);font-size:19px;font-weight:700;margin-bottom:4px}
.v-sub{font-family:var(--mono);font-size:12px;color:var(--td)}
.pills{display:flex;gap:10px}
.pill{border-radius:8px;padding:7px 14px;text-align:center;min-width:68px}
.pill-n{font-size:20px;font-weight:700;font-family:var(--mono)}
.pill-l{font-size:10px;opacity:0.8;text-transform:uppercase;letter-spacing:0.08em}
.pill-c{background:var(--red-d);border:1px solid rgba(224,82,82,0.2);color:var(--red)}
.pill-w{background:var(--amber-d);border:1px solid rgba(245,158,11,0.2);color:var(--amber)}
.pill-i{background:var(--blue-d);border:1px solid rgba(96,165,250,0.2);color:var(--blue)}

.cards-row{display:flex;gap:18px;flex-wrap:wrap}
.card{background:var(--card);border:1px solid var(--gold-b);border-radius:12px;padding:22px}
.card-h{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.card-t{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--gold);letter-spacing:0.04em}

.cost-big{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:6px;font-family:var(--mono)}
.cost-old{font-size:26px;font-weight:700;color:var(--td);text-decoration:line-through;text-decoration-color:rgba(148,163,184,0.4)}
.cost-new{font-size:30px;font-weight:700;color:var(--green)}
.pct-badge{
display:inline-flex;align-items:center;gap:5px;
border-radius:6px;padding:3px 11px;margin-bottom:18px;font-family:var(--mono);
}
.pct-down{background:var(--green-d);border:1px solid rgba(74,222,128,0.2)}
.pct-up{background:var(--red-d);border:1px solid rgba(224,82,82,0.2)}
.minis{display:flex;gap:10px;flex-wrap:wrap;font-family:var(--mono)}
.mini{background:rgba(255,255,255,0.03);border-radius:8px;padding:7px 12px;flex:1 1 100px}
.mini-l{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px}
.mini-v{font-size:12px;color:var(--t)}
.mini-v .old{opacity:0.5;text-decoration:line-through}

.bar-section{margin-top:18px}
.bar-label{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.bar-row{margin-bottom:9px}
.bar-top{display:flex;justify-content:space-between;margin-bottom:2px;font-family:var(--mono)}
.bar-name{font-size:12px;color:var(--t)}
.bar-vals{font-size:11px;color:var(--td)}
.bar-track{position:relative;height:5px;background:rgba(255,255,255,0.04);border-radius:3px}
.bar-bg{position:absolute;height:100%;border-radius:3px;background:rgba(148,163,184,0.2)}
.bar-fg{position:absolute;height:100%;border-radius:3px;transition:width 1s cubic-bezier(0.16,1,0.3,1)}

.tier-row{display:flex;align-items:center;gap:9px;margin-bottom:12px;flex-wrap:wrap;font-family:var(--mono)}
.tier-name{font-size:13px;color:var(--t);min-width:65px}
.tier-pill{font-size:12px;font-weight:600;padding:3px 11px;border-radius:6px}
.tier-arrow{color:var(--td);font-size:15px}
.removed-pill{font-size:12px;color:var(--red);background:var(--red-d);padding:3px 10px;border-radius:4px;border:1px solid rgba(224,82,82,0.2)}

.diff-line{display:flex;align-items:center;gap:9px;margin-bottom:9px;padding:5px 9px;border-radius:6px}
.diff-icon{font-family:var(--mono);font-size:15px;font-weight:700;width:16px;text-align:center}
.diff-name{font-family:var(--mono);font-size:13px;color:var(--t);font-weight:600}
.diff-detail{font-size:11px;color:var(--td);margin-left:auto}

.route-section{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06)}
.route-label{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px}
.route-item{font-family:var(--mono);font-size:12px;color:var(--td);margin-bottom:3px}
.sep{height:1px;background:rgba(255,255,255,0.06);margin:10px 0}

.findings-card{background:var(--card);border:1px solid var(--gold-b);border-radius:12px;padding:22px}
.findings-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.filter-btns{display:flex;gap:3px}
.filter-btn{
background:transparent;border:1px solid rgba(255,255,255,0.08);border-radius:4px;
padding:3px 9px;cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--td);letter-spacing:0.04em;
}
.filter-btn.active{background:var(--gold-d);border-color:var(--gold-b);color:var(--gold)}
.finding-row{
display:flex;align-items:center;gap:9px;padding:7px 11px;border-radius:6px;
background:rgba(255,255,255,0.02);margin-bottom:5px;flex-wrap:wrap;
}
.finding-row[data-sev="CRITICAL"]{border-left:3px solid var(--red)}
.finding-row[data-sev="WARNING"]{border-left:3px solid var(--amber)}
.finding-row[data-sev="INFO"]{border-left:3px solid var(--blue)}
.sev-badge{
display:inline-flex;align-items:center;gap:3px;padding:1px 8px;border-radius:4px;
font-size:10px;font-weight:600;font-family:var(--mono);letter-spacing:0.04em;
}
.sev-c{background:var(--red-d);border:1px solid rgba(224,82,82,0.3);color:var(--red)}
.sev-w{background:var(--amber-d);border:1px solid rgba(245,158,11,0.3);color:var(--amber)}
.sev-i{background:var(--blue-d);border:1px solid rgba(96,165,250,0.3);color:var(--blue)}
.f-code{font-family:var(--mono);font-size:11px;color:var(--td);min-width:58px}
.f-cat{font-family:var(--mono);font-size:11px;color:var(--purple);min-width:68px}
.f-msg{font-size:13px;color:var(--t);flex:1;min-width:200px}

.diff-empty{
display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:60px 20px;text-align:center;gap:16px;
}
.diff-empty-icon{font-size:40px;opacity:0.3}
.diff-empty-title{font-family:var(--serif);font-size:18px;color:var(--gold);opacity:0.6}
.diff-empty-sub{font-family:var(--mono);font-size:12px;color:var(--td);max-width:400px;line-height:1.6}

.diff-input-bar{
display:flex;align-items:center;gap:10px;padding:12px 16px;
background:var(--card);border:1px solid var(--gold-b);border-radius:10px;
}
.diff-input-label{font-family:var(--mono);font-size:11px;color:var(--td);white-space:nowrap}
.diff-input-file{
font-family:var(--mono);font-size:12px;color:var(--t);
background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
border-radius:4px;padding:5px 10px;flex:1;min-width:0;outline:none;
}
.diff-input-file:focus{border-color:var(--gold-b)}
.diff-input-vs{font-family:var(--mono);font-size:12px;color:var(--td)}
.diff-run-btn{
font-family:var(--mono);font-size:11px;font-weight:600;padding:6px 16px;
border:1px solid rgba(201,165,84,0.3);border-radius:4px;
background:rgba(201,165,84,0.1);color:var(--gold);cursor:pointer;
transition:all 0.2s;white-space:nowrap;
}
.diff-run-btn:hover{background:rgba(201,165,84,0.2);border-color:rgba(201,165,84,0.5)}

@media(max-width:768px){
.editor-output{display:none}
.tab-btn{padding:0 10px;font-size:11px}
.cards-row{flex-direction:column}
.verdict{flex-direction:column;text-align:center}
.pills{justify-content:center}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
</head>
<body>

<div class="ide-shell">
  <div class="ide-header">
    <div class="ide-logo">
      <span class="ide-logo-n">NOUS IDE</span>
      <span class="ide-logo-sub">Νοῦς</span></div><a href="/" style="display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--td);text-decoration:none;padding:4px 12px;border:1px solid rgba(255,255,255,0.08);border-radius:4px;transition:all 0.2s" onmouseover="this.style.borderColor='rgba(201,165,84,0.3)';this.style.color='#c9a554'" onmouseout="this.style.borderColor='rgba(255,255,255,0.08)';this.style.color='#94a3b8'">2190 Home</a><div style="display:none">
    </div>
    <span class="ide-version">v4.0.0</span>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="editor"><span class="tab-icon">⌘</span>Editor</button>
    <button class="tab-btn" data-tab="verify"><span class="tab-icon">✓</span>Verify</button>
    <button class="tab-btn" data-tab="graph"><span class="tab-icon">◇</span>Graph</button>
    <button class="tab-btn" data-tab="diff"><span class="tab-icon">⊿</span>Architecture Diff</button>
    <button class="tab-btn" data-tab="chat"><span class="tab-icon">◉</span>Chat</button>
  </div>

  <div class="tab-panels">

    <div class="tab-panel active" id="panel-editor">
      <div class="editor-wrap">
        <div class="editor-area">
          <div class="editor-toolbar">
            <button class="editor-toolbar-btn" id="btn-compile">▶ Compile</button>
            <button class="editor-toolbar-btn" id="btn-verify">✓ Verify</button>
            <button class="editor-toolbar-btn" id="btn-run">⚡ Run</button>
            <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
<select id="tpl-select" style="background:#0a0e17;color:#94a3b8;border:1px solid #1a2235;border-radius:4px;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;outline:none" onchange="loadTemplate(this.value)">
<option value="">Load template…</option>
</select>
<button class="editor-toolbar-btn" id="btn-download-py" onclick="downloadPython()" style="opacity:0.4;cursor:default" disabled title="Compile first to enable download">⬇ Download .py</button>
</div>
<span class="editor-file" id="editor-filename">untitled.nous</span>
          </div>
          <div id="monaco-container"></div>
        </div>
        <div class="editor-output">
          <div class="output-header">Output</div>
          <div class="output-content" id="editor-output">Ready.</div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="panel-verify">
      <div class="placeholder">
        <div class="placeholder-icon">✓</div>
        <div class="placeholder-text">Write code in Editor, then click Verify</div>
      </div>
    </div>

    <div class="tab-panel" id="panel-graph" style="position:relative;overflow:hidden">
      <div id="graph-bar" style="position:absolute;top:0;left:0;right:0;z-index:10;padding:10px 16px;background:rgba(5,7,14,0.92);border-bottom:1px solid rgba(201,165,84,0.12);display:flex;align-items:center;gap:12px">
        <button onclick="renderGraph()" style="background:#c9a554;color:#05070e;border:none;padding:5px 14px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;cursor:pointer">RENDER</button>
        <button onclick="graphFit()" style="background:transparent;color:#5a6a7e;border:1px solid #1a2235;padding:5px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer">Fit</button>
        <span id="graph-info" style="color:#5a6a7e;font-size:11px;font-family:'JetBrains Mono',monospace;margin-left:auto"></span>
      </div>
      <div id="cy-container" style="width:100%;height:calc(100vh - 140px);margin-top:42px;background:#05070e"></div>
      <div id="cy-tip" style="display:none;position:absolute;z-index:20;background:rgba(10,15,26,0.95);border:1px solid rgba(201,165,84,0.25);border-radius:8px;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;box-shadow:0 4px 20px rgba(0,0,0,0.5);max-width:300px;pointer-events:none"></div>
      <div id="cy-empty" style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;background:#05070e">
        <div style="font-size:44px;color:rgba(201,165,84,0.15);margin-bottom:16px">◇</div>
        <div style="color:#5a6a7e;font-size:13px;margin-bottom:20px">Write code with a <code style="color:#c9a554">nervous_system</code> block, then render</div>
        <button onclick="renderGraph()" style="background:#c9a554;color:#05070e;border:none;padding:8px 20px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer">RENDER GRAPH</button>
        <button onclick="renderDemo()" style="background:transparent;color:#5a6a7e;border:1px solid #1a2235;padding:8px 20px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;margin-top:12px">DEMO (3 nodes)</button>
      </div>
    </div>

    <div class="tab-panel" id="panel-diff">
      <div class="diff-wrap" id="diff-container"></div>
    </div>
    <div class="tab-panel" id="panel-chat">
      <div style="display:flex;flex-direction:column;height:100%;background:#05070e">
        <div style="padding:8px 16px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #1a1f35">
          <select id="chat-world" style="background:#0a0e1c;color:#e2e8f0;border:1px solid #1a1f35;border-radius:4px;padding:4px 8px;font-size:12px;font-family:inherit"></select>
          <select id="chat-soul" style="background:#0a0e1c;color:#e2e8f0;border:1px solid #1a1f35;border-radius:4px;padding:4px 8px;font-size:12px;font-family:inherit">
            <option value="">Auto-route</option>
          </select>
          <span id="chat-status" style="font-size:11px;color:#4a5568;margin-left:auto"></span>
          <button onclick="clearChat()" style="background:transparent;color:#4a5568;border:1px solid #1a1f35;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer">Clear</button>
        </div>
        <div id="chat-messages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px"></div>
        <div style="padding:10px 16px;border-top:1px solid #1a1f35;display:flex;gap:8px">
          <input id="chat-input" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()" style="flex:1;background:#0a0e1c;color:#e2e8f0;border:1px solid #1a1f35;border-radius:6px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none">
          <button id="btn-send-chat" onclick="sendChat()" style="background:linear-gradient(135deg,#c9a554,#b8943f);color:#05070e;border:none;border-radius:6px;padding:8px 20px;font-weight:600;font-size:13px;cursor:pointer">Send</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(function(){

// ═══ Monaco Editor Setup ═══
var _monacoEditor = null;
var _monacoReady = false;
var _defaultCode = '// Write your NOUS program here...\n\nworld MyPipeline {\n    law cost_ceiling = $0.50 per cycle\n    heartbeat = 30s\n}\n\nmessage Signal {\n    source: string\n    data: string\n    confidence: float = 0.0\n}\n\nsoul Scanner {\n    mind: claude-sonnet @ Tier0A\n    senses: [http_get]\n    memory {\n        scan_count: int = 0\n    }\n    instinct {\n        let raw = sense http_get(url: "https://api.example.com/data")\n        remember scan_count += 1\n        speak Signal(source: "scanner", data: raw, confidence: 0.85)\n    }\n    heal {\n        on timeout => retry(3, exponential)\n    }\n}';

window.getEditorCode = getEditorCode;
window.setEditorCode = setEditorCode;
function getEditorCode() {
  if (_monacoEditor) return _monacoEditor.getValue();
  var el = document.getElementById('code-editor');
  return el ? el.value : '';
}

function setEditorCode(val) {
  if (_monacoEditor) { _monacoEditor.setValue(val); return; }
  var el = document.getElementById('code-editor');
  if (el) el.value = val;

function tierColor(t) {
  if (!t) return '#94a3b8';
  if (t.includes('0A')) return '#a78bfa';
  if (t.includes('0B')) return '#60a5fa';
  if (t === 'Tier1') return '#34d399';
  if (t === 'Tier2') return '#fbbf24';
  if (t === 'Tier3') return '#94a3b8';
  if (t === 'Groq') return '#f97316';
  if (t === 'Cerebras') return '#22d3ee';
  if (t === 'Together') return '#a78bfa';
  if (t === 'Fireworks') return '#ef4444';
  return '#c9a554';
}

function renderDiff(data) {
  if (!data) { 
renderEmpty(); return; }
  const d = data;
  const c = d.cost;
  const pct = ((c.total_after - c.total_before) / c.total_before * 100);
  const isDown = pct < 0;
  const monthSaved = c.monthly_before - c.monthly_after;
  const breaking = d.verdict.critical > 0;
  const maxCost = Math.max(...c.souls.filter(s => s.before !== null).map(s => s.before));
  const tierChanges = c.souls.filter(s => s.tier_before !== s.tier_after && s.tier_after !== null);
  const tierRemoved = c.souls.filter(s => s.tier_after === null);

  let html = '';

  html += '<div class="diff-input-bar">';
  html += '<span class="diff-input-label">Original:</span>';
  html += '<input class="diff-input-file" value="' + d.source + '" readonly>';
  html += '<span class="diff-input-vs">vs</span>';
  html += '<input class="diff-input-file" value="' + d.target + '" readonly>';
  html += '<button class="diff-run-btn" onclick="loadDemoData()">&#9654; Run Diff</button>';
  html += '</div>';

  html += '<div class="verdict ' + (breaking ? 'brk' : 'safe') + '">';
  html += '<div>';
  html += '<div class="v-title" style="color:' + (breaking ? 'var(--red)' : 'var(--green)') + '">';
  html += breaking ? 'BREAKING CHANGES DETECTED' : 'SAFE TO DEPLOY';
  html += '</div>';
  html += '<div class="v-sub">' + d.source + ' \u2192 ' + d.target + ' \u00B7 ' + d.findings.length + ' findings</div>';
  html += '</div><div class="pills">';
  if (d.verdict.critical > 0) html += '<div class="pill pill-c"><div class="pill-n">' + d.verdict.critical + '</div><div class="pill-l">Critical</div></div>';
  if (d.verdict.warning > 0) html += '<div class="pill pill-w"><div class="pill-n">' + d.verdict.warning + '</div><div class="pill-l">Warning</div></div>';
  if (d.verdict.info > 0) html += '<div class="pill pill-i"><div class="pill-n">' + d.verdict.info + '</div><div class="pill-l">Info</div></div>';
  html += '</div></div>';

  html += '<div class="cards-row">';

  html += '<div class="card" style="flex:1 1 340px;min-width:300px">';
  html += '<div class="card-h"><span style="font-size:17px">\u25CE</span><span class="card-t">Cost impact</span></div>';
  html += '<div class="cost-big"><span class="cost-old">$' + c.monthly_before.toFixed(2) + '</span>';
  html += '<span style="font-size:18px;color:var(--td)">\u2192</span>';
  html += '<span class="cost-new" id="cost-anim">$' + c.monthly_after.toFixed(2) + '</span>';
  html += '<span style="font-size:13px;color:var(--td)">/month</span></div>';
  html += '<div class="pct-badge ' + (isDown ? 'pct-down' : 'pct-up') + '">';
  html += '<span style="font-size:15px;color:' + (isDown ? 'var(--green)' : 'var(--red)') + '">' + (isDown ? '\u2193' : '\u2191') + '</span>';
  html += '<span style="font-size:13px;font-weight:600;color:' + (isDown ? 'var(--green)' : 'var(--red)') + '">' + Math.abs(pct).toFixed(1) + '%</span>';
  if (monthSaved > 0) html += '<span style="font-size:11px;color:var(--green);opacity:0.8">\u00B7 saving $' + monthSaved.toFixed(2) + '/mo</span>';
  html += '</div>';

  html += '<div class="minis">';
  html += '<div class="mini"><div class="mini-l">Per cycle</div><div class="mini-v"><span class="old">$' + c.total_before.toFixed(4) + '</span> \u2192 <span style="color:' + (c.total_after < c.total_before ? 'var(--green)' : 'var(--red)') + '">$' + c.total_after.toFixed(4) + '</span></div></div>';
  html += '<div class="mini"><div class="mini-l">Daily</div><div class="mini-v"><span class="old">$' + c.daily_before.toFixed(2) + '</span> \u2192 <span style="color:' + (c.daily_after < c.daily_before ? 'var(--green)' : 'var(--red)') + '">$' + c.daily_after.toFixed(2) + '</span></div></div>';
  html += '</div>';

  html += '<div class="bar-section"><div class="bar-label">Per-soul breakdown</div>';
  c.souls.filter(s => s.before !== null).forEach(s => {
    const wB = (s.before / maxCost * 100).toFixed(0);
    const wA = s.after !== null ? (s.after / maxCost * 100).toFixed(0) : '0';
    const col = s.after === null ? 'var(--red)' : (s.after < s.before ? 'var(--green)' : 'var(--gold)');
    const valAfter = s.after !== null ? '$' + (s.after * 1000).toFixed(2) : 'removed';
    html += '<div class="bar-row"><div class="bar-top"><span class="bar-name">' + s.name + '</span><span class="bar-vals">$' + (s.before * 1000).toFixed(2) + ' \u2192 ' + valAfter + '</span></div>';
    html += '<div class="bar-track"><div class="bar-bg" style="width:' + wB + '%"></div><div class="bar-fg" style="width:' + wA + '%;background:' + col + '"></div></div></div>';
  });
  html += '</div></div>';

  if (tierChanges.length > 0 || tierRemoved.length > 0) {
    html += '<div class="card" style="flex:1 1 280px;min-width:260px">';
    html += '<div class="card-h"><span style="font-size:17px">\u2B21</span><span class="card-t">Mind / tier changes</span></div>';
    tierChanges.forEach(s => {
      const cB = tierColor(s.tier_before), cA = tierColor(s.tier_after);
      html += '<div class="tier-row"><span class="tier-name">' + s.name + '</span>';
      html += '<span class="tier-pill" style="color:' + cB + '88;background:' + cB + '0a;border:1px solid ' + cB + '22;opacity:0.6">' + s.tier_before + '</span>';
      html += '<span class="tier-arrow">\u2192</span>';
      html += '<span class="tier-pill" style="color:' + cA + ';background:' + cA + '18;border:1px solid ' + cA + '44">' + s.tier_after + '</span>';
      html += '</div>';
    });
    tierRemoved.forEach(s => {
      const cB = tierColor(s.tier_before);
      html += '<div class="tier-row"><span class="tier-name" style="text-decoration:line-through;color:var(--td)">' + s.name + '</span>';
      html += '<span class="tier-pill" style="color:' + cB + '88;background:' + cB + '0a;border:1px solid ' + cB + '22;opacity:0.6">' + s.tier_before + '</span>';
      html += '<span class="tier-arrow">\u2192</span>';
      html += '<span class="removed-pill">REMOVED</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '</div>';

  const topo = d.topology;
  const caps = d.capabilities;
  const mem = d.memory;
  const hasTopo = topo.added.length > 0 || topo.removed.length > 0 || topo.modified.length > 0;
  const hasCaps = caps.senses_added.length > 0 || caps.senses_removed.length > 0 || mem.fields_added.length > 0 || mem.fields_removed.length > 0;

  if (hasTopo || hasCaps) {
    html += '<div class="cards-row">';
    if (hasTopo) {
      html += '<div class="card" style="flex:1 1 260px;min-width:240px">';
      html += '<div class="card-h"><span style="font-size:17px">\u25C7</span><span class="card-t">Topology</span></div>';
      topo.removed.forEach(s => { html += diffLine('\u2212', 'var(--red)', s, 'Soul removed', 'var(--red-d)'); });
      topo.added.forEach(s => { html += diffLine('+', 'var(--green)', s, 'Soul added', 'var(--green-d)'); });
      topo.modified.forEach(s => { html += diffLine('~', 'var(--amber)', s, 'Modified', 'var(--amber-d)'); });
      if (topo.route_changes.length > 0) {
        html += '<div class="route-section"><div class="route-label">Route changes</div>';
        topo.route_changes.forEach(r => {
          const col = r.type === 'removed' ? 'var(--red)' : 'var(--green)';
          const sym = r.type === 'removed' ? '\u2212' : '+';
          html += '<div class="route-item"><span style="color:' + col + '">' + sym + '</span> ' + (r.from || r.to) + '</div>';
        });
        html += '</div>';
      }
      html += '</div>';
    }
    if (hasCaps) {
      html += '<div class="card" style="flex:1 1 260px;min-width:240px">';
      html += '<div class="card-h"><span style="font-size:17px">\u2394</span><span class="card-t">Capabilities &amp; memory</span></div>';
      caps.senses_added.forEach(s => { html += diffLine('+', 'var(--green)', s.soul + '.' + s.sense, 'sense added', 'rgba(74,222,128,0.06)'); });
      caps.senses_removed.forEach(s => { html += diffLine('\u2212', 'var(--red)', s.soul + '.' + s.sense, 'sense removed', 'rgba(224,82,82,0.06)'); });
      if ((caps.senses_added.length > 0 || caps.senses_removed.length > 0) && (mem.fields_added.length > 0 || mem.fields_removed.length > 0)) {
        html += '<div class="sep"></div>';
      }
      mem.fields_added.forEach(f => { html += diffLine('+', 'var(--cyan)', f.soul + '.' + f.field, f.type, 'rgba(34,211,238,0.06)'); });
      mem.fields_removed.forEach(f => { html += diffLine('\u2212', 'var(--red)', f.soul + '.' + f.field, f.type, 'rgba(224,82,82,0.06)'); });
      html += '</div>';
    }
    html += '</div>';
  }

  html += '<div class="findings-card">';
  html += '<div class="findings-top">';
  html += '<div class="card-h" style="margin-bottom:0"><span style="font-size:17px">\u229E</span><span class="card-t">All findings</span></div>';
  html += '<div class="filter-btns" id="diff-filters">';
  html += '<button class="filter-btn active" data-f="ALL">ALL</button>';

    document.querySelectorAll('.bar-fg').forEach(el => {

window.runLiveDiff = function() {

    alert('Write your original .nous code in the Editor tab first.');

    alert('Paste the modified .nous code in the textarea above.');

    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ original: original, modified: modified })
  })

      '<div class="diff-empty"><div class="diff-empty-icon" style="color:var(--red)">\u2717</div>' +
      '<div class="diff-empty-title" style="color:var(--red)">Connection Error</div>' +

window.downloadPython = downloadPython;
function downloadPython() {
  if (!_lastCompiledPython) { alert('Compile your .nous program first.'); return; }
  var blob = new Blob([_lastCompiledPython], { type: 'text/x-python' });
  var url = URL.createObjectURL(blob);

  a.href = url;
  a.download = _lastWorldName + '_generated.py';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

      Object.keys(cats).forEach(function(c){
        t += '\u2500\u2500 '+c+' \u2500\u2500\n';

        t += '\n';
      });
      if((d.warnings||[]).length){t += '\u2500\u2500 Warnings \u2500\u2500\n';(d.warnings||[]).forEach(function(w){t += '\u26a0 ['+w.code+'] '+(w.message||'')+'\n';});t += '\n';}
      t += 'RESULT: '+d.proven.length+' proven, '+(d.errors||[]).length+' errors';

      (d.errors||[]).forEach(function(e){t += '\u2717 '+(e.message||e.error||JSON.stringify(e))+'\n';});

  }).catch(function(e){vp.innerHTML='<pre style="padding:24px;font-family:var(--mono);color:var(--red)">Error: '+e.message+'</pre>';});

<script>
// ═══ NOUS Graph — Standalone (outside IIFE) ═══
(function initNousGraph() {
  if (typeof cytoscape === 'undefined') {
    console.error('Cytoscape not loaded');
    return;
  }

  var cyInst = null;
  var cyPulse = null;

  function parseSouls(code) {
    var nodes = [], edges = [];
    var ns = code.match(/nervous_system\s*\{([^}]*)\}/s);
    if (ns) {
      ns[1].split('\n').forEach(function(ln) {
        ln = ln.replace(/#.*$/, '').trim();
        if (ln.indexOf('->') < 0) return;
        var parts = ln.split(/\s*->\s*/);
        for (var i = 0; i < parts.length; i++) {
          var n = parts[i].trim();
          if (n && /^\w+$/.test(n)) {
            if (nodes.indexOf(n) < 0) nodes.push(n);
            if (i > 0) { var prev = parts[i-1].trim(); if (/^\w+$/.test(prev)) edges.push({s:prev,t:n}); }
          }
        }
      });
    }
    if (nodes.length === 0) {
      (code.match(/soul\s+(\w+)/g) || []).forEach(function(m) {
        var name = m.replace(/^soul\s+/, '');
        if (nodes.indexOf(name) < 0) nodes.push(name);
      });
    }
    console.log('NOUS Graph parsed:', nodes.length, 'nodes,', edges.length, 'edges', {nodes:nodes, edges:edges});
    return {nodes: nodes, edges: edges};
  }

  function getMeta(code, name) {
    var re = new RegExp('soul\\s+' + name + '\\s*\\{([\\s\\S]*?)\\n\\}', 'm');
    var m = code.match(re);
    if (!m) return {model:'',tier:'',senses:[],feat:[]};
    var b = m[1];
    var mind = b.match(/mind\s*:\s*([\w\-]+)\s*@\s*(\w+)/);
    var sens = b.match(/senses\s*:\s*\[([^\]]*)\]/);
    var feat = [];
    if (/heal\s*\{/.test(b)) feat.push('heal');
    if (/mitosis\s*\{/.test(b)) feat.push('mitosis');
    if (/immune_system\s*\{/.test(b)) feat.push('immune');
    if (/dream_system\s*\{/.test(b)) feat.push('dream');
    if (/symbiosis\s*\{/.test(b)) feat.push('symbiosis');
    if (/metabolism\s*\{/.test(b)) feat.push('metabolism');
    if (/consciousness\s*\{/.test(b)) feat.push('consciousness');
    return {
      model: mind ? mind[1] : '',
      tier: mind ? mind[2] : '',
      senses: sens ? sens[1].split(',').map(function(s){return s.trim();}).filter(Boolean) : [],
      feat: feat
    };
  }

  function tc(tier) {
    return {Tier0A:'#a78bfa',Tier0B:'#60a5fa',Tier1:'#34d399',Tier2:'#fbbf24',Tier3:'#94a3b8',Groq:'#f97316',Cerebras:'#22d3ee',Together:'#a78bfa',Fireworks:'#ef4444'}[tier] || '#c9a554';
  }

  function doRender(code) {
    var p = parseSouls(code);
    var box = document.getElementById('cy-container');
    var empty = document.getElementById('cy-empty');
    var info = document.getElementById('graph-info');
    var tip = document.getElementById('cy-tip');
    if (!box) { console.error('cy-container not found'); return; }
    if (p.nodes.length === 0) {
      if (empty) empty.style.display = 'flex';
      box.style.display = 'none';
      return;
    }
    if (empty) empty.style.display = 'none';
    box.style.display = 'block';

    var inD = {};
    p.nodes.forEach(function(n) { inD[n] = 0; });
    p.edges.forEach(function(e) { inD[e.t] = (inD[e.t]||0) + 1; });

    var els = [];
    p.nodes.forEach(function(name) {
      var m = getMeta(code, name);
      var isE = (inD[name]||0) === 0 && p.edges.length > 0;
      els.push({ data: { id: name, label: name + (m.tier ? '\n@ '+m.tier : ''), tc: tc(m.tier), isE: isE, meta: m } });
    });
    p.edges.forEach(function(e, i) {
      els.push({ data: { id: 'e'+i, source: e.s, target: e.t } });
    });

    if (cyInst) { cyInst.destroy(); cyInst = null; }
    if (cyPulse) { clearInterval(cyPulse); cyPulse = null; }

    cyInst = cytoscape({
      container: box,
      elements: els,
      style: [
        { selector: 'node', style: {
          'label': 'data(label)', 'text-wrap': 'wrap', 'text-valign': 'center', 'text-halign': 'center',
          'font-family': 'JetBrains Mono, monospace', 'font-size': '14px', 'color': '#e2e8f0',
          'background-color': '#0a0e17', 'border-width': 1.5, 'border-color': 'data(tc)',
          'shape': 'roundrectangle', 'width': 200, 'height': 70, 'overlay-opacity': 0
        }},
        { selector: 'node[?isE]', style: {
          'border-width': 3, 'border-color': '#c9a554', 'background-color': 'rgba(201,165,84,0.1)'
        }},
        { selector: 'edge', style: {
          'width': 2, 'line-color': 'rgba(201,165,84,0.3)', 'target-arrow-color': 'rgba(201,165,84,0.6)',
          'target-arrow-shape': 'triangle', 'arrow-scale': 0.8, 'curve-style': 'bezier', 'overlay-opacity': 0
        }},
        { selector: '.bright', style: { 'border-width': 2.5 } },
        { selector: '.dim', style: { 'border-width': 1 } },
        { selector: '.epulse', style: { 'line-color': 'rgba(201,165,84,0.6)', 'width': 3, 'target-arrow-color': '#c9a554' } }
      ],
      layout: {
        name: p.edges.length > 0 ? 'dagre' : 'grid',
        rankDir: 'TB', nodeSep: 120, rankSep: 160,
        animate: true, animationDuration: 500, fit: true, padding: 80
      },
      minZoom: 0.3, maxZoom: 3
    });

    // Heartbeat
    var beat = false;
    cyPulse = setInterval(function() {
      if (!cyInst) return;
      beat = !beat;
      cyInst.nodes().forEach(function(n, i) {
        setTimeout(function() { n.removeClass(beat?'dim':'bright'); n.addClass(beat?'bright':'dim'); }, i*60);
      });
      cyInst.edges().forEach(function(e, i) {
        setTimeout(function() { e.addClass('epulse'); setTimeout(function(){e.removeClass('epulse');},500); }, i*120+100);
      });
    }, 2200);

    // Tooltip
    if (tip) {
      cyInst.on('tap', 'node', function(evt) {
        var d = evt.target.data(), m = d.meta, pos = evt.renderedPosition;
        var h = '<div style="color:#c9a554;font-weight:700;margin-bottom:6px">' + d.id + '</div>';
        h += '<div style="color:#e2e8f0">' + (m.model||'\u2014') + ' <span style="color:'+tc(m.tier)+'">@ '+(m.tier||'\u2014')+'</span></div>';
        if (m.senses.length) h += '<div style="color:#45d1c8;margin-top:4px">senses: '+m.senses.join(', ')+'</div>';
        if (m.feat.length) h += '<div style="margin-top:4px;color:#b8c4d4">'+m.feat.join(' \u00b7 ')+'</div>';
        if (d.isE) h += '<div style="margin-top:4px;color:#c9a554;font-size:9px">\u25b6 ENTRYPOINT</div>';
        tip.innerHTML = h; tip.style.display = 'block';
        var r = box.getBoundingClientRect();
        tip.style.left = Math.min(pos.x+16, r.width-320)+'px';
        tip.style.top = Math.min(pos.y+16, r.height-180)+'px';
      });
      cyInst.on('tap', function(e) { if (e.target === cyInst) tip.style.display = 'none'; });
    }

    if (info) info.textContent = p.nodes.length + ' souls \u00b7 ' + p.edges.length + ' routes';
    console.log('NOUS Graph rendered:', p.nodes.length, 'nodes,', p.edges.length, 'edges');
  }

  // ═══ Global functions for onclick ═══
  window.renderGraph = function() {
    var code = getEditorCode();
    console.log('renderGraph called, code length:', code.length);
    doRender(code);
  };

  window.graphFit = function() {
    if (cyInst) cyInst.fit(undefined, 50);
  };

  window.graphResize = function() {
    if (cyInst) { cyInst.resize(); cyInst.fit(undefined, 80); }
  };

  window.renderDemo = function() {
    console.log('renderDemo called');
    var demo = 'world Demo { law cost_ceiling = $1.00 per cycle\nheartbeat = 10s }\n' +
      'soul Alpha { mind: test @ Tier0A\ninstinct { let x = 1 }\nheal { on e => retry(1,e) } }\n' +
      'soul Beta { mind: test @ Tier1\ninstinct { let y = 2 }\nheal { on e => retry(1,e) }\nmetabolism { max_energy: 100\nenergy_per_cycle: 5\nrecovery_rate: 3\nfatigue_tier: Cerebras\nhibernate_threshold: 10 } }\n' +
      'soul Gamma { mind: test @ Cerebras\ninstinct { let z = 3 }\nheal { on e => retry(1,e) }\nconsciousness { goals: [accuracy]\nreflect_every: 5\nself_model: true\ngoal_threshold: 0.8 } }\n' +
      'nervous_system { Alpha -> Beta -> Gamma }';
    doRender(demo);
  };

  // Auto-render on Graph tab click
  var gt = document.querySelector('[data-tab="graph"]');
  if (gt) {
    gt.addEventListener('click', function() {
      setTimeout(function() {
        if (cyInst) { cyInst.resize(); cyInst.fit(undefined, 50); }
      }, 200);
    });
  }

  console.log('NOUS Graph module loaded');

// Auto-verify handled by btn-verify click handler

})();

var _chatTotalCost = 0;

window.clearChat = function() {

function _chatBubble(role, text, meta) {
  var isUser = role === 'user';
  var div = document.createElement('div');
  div.style.cssText = 'max-width:80%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;word-wrap:break-word;' +
    (isUser
      ? 'align-self:flex-end;background:#1a1f35;color:#e2e8f0;border-bottom-right-radius:4px'
      : 'align-self:flex-start;background:#0f1524;color:#e2e8f0;border:1px solid #1a1f35;border-bottom-left-radius:4px');
  div.textContent = text;
  if (!isUser && meta) {
    var info = document.createElement('div');
    info.style.cssText = 'font-size:10px;color:#4a5568;margin-top:6px';
    info.textContent = meta;
    div.appendChild(info);
  }
  return div;
}

window.sendChat = async function() {
  var input = document.getElementById('chat-input');
  var msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  var container = document.getElementById('chat-messages');
  var welcome = container.querySelector('div[style*="text-align:center"]');
  if (welcome) welcome.remove();

  container.appendChild(_chatBubble('user', msg));
  container.scrollTop = container.scrollHeight;

  var worldSel = document.getElementById('chat-world');
  var soulSel = document.getElementById('chat-soul');
  var world = worldSel ? worldSel.value : 'customer_service';
  var soul = soulSel ? soulSel.value : '';

  var statusEl = document.getElementById('chat-status');
  if (statusEl) statusEl.textContent = 'Connecting...';
  var btn = document.getElementById('btn-send-chat');
  if (btn) btn.disabled = true;

  var payload = {message: msg, world: world, mode: 'live'};
  if (_chatSessionId) payload.session_id = _chatSessionId;
  if (soul) payload.soul = soul;

  var bubble = document.createElement('div');
  bubble.style.cssText = 'max-width:80%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;word-wrap:break-word;align-self:flex-start;background:#0f1524;color:#e2e8f0;border:1px solid #1a1f35;border-bottom-left-radius:4px';
  var textSpan = document.createElement('span');
  textSpan.textContent = '\u2758';
  bubble.appendChild(textSpan);
  container.appendChild(bubble);
  container.scrollTop = container.scrollHeight;

  var textSoFar = '';
  var streamDone = false;

  try {
    var response = await fetch('/api/v1/chat/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      var errData = await response.json().catch(function() { return {}; });
      var errMsg = errData.detail ? (typeof errData.detail === 'string' ? errData.detail : errData.detail.error || 'Request failed') : 'HTTP ' + response.status;
      textSpan.textContent = '\u274c ' + errMsg;
      if (statusEl) statusEl.textContent = 'Error';
      if (btn) btn.disabled = false;
      return;
    }

    var reader = response.body.getReader();
    var decoder = new TextDecoder();
    var sseBuffer = '';
    var currentEvent = '';

    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      sseBuffer += decoder.decode(chunk.value, {stream: true});

      var lines = sseBuffer.split('\n');
      sseBuffer = lines.pop();

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) { currentEvent = ''; continue; }
        if (line.indexOf('event: ') === 0) {
          currentEvent = line.slice(7);
          continue;
        }
        if (line.indexOf('data: ') !== 0) continue;
        var raw = line.slice(6);

        try { var d = JSON.parse(raw); } catch(e) { continue; }

        if (currentEvent === 'start') {
          if (statusEl) statusEl.textContent = 'Streaming \u00b7 ' + (d.tier || '');
        } else if (currentEvent === 'token') {
          textSoFar += (d.t || '');
          textSpan.textContent = textSoFar + '\u2758';
          container.scrollTop = container.scrollHeight;
        } else if (currentEvent === 'done') {
          streamDone = true;
          _chatSessionId = d.session_id;
          _chatTotalCost += (d.cost || 0);
          textSpan.textContent = textSoFar;
          var meta = (d.soul || '') + ' \u00b7 ' + (d.tier || '') + ' \u00b7 ' + (d.elapsed_ms != null ? Number(d.elapsed_ms).toFixed(0) : '0') + 'ms \u00b7 $' + (d.cost || 0).toFixed(4);
          var info = document.createElement('div');
          info.style.cssText = 'font-size:10px;color:#4a5568;margin-top:6px';
          info.textContent = meta;
          bubble.appendChild(info);
          if (statusEl) statusEl.textContent = 'Turn ' + (d.turns || '') + ' \u00b7 Total: $' + _chatTotalCost.toFixed(4);

          if (soulSel && d.soul) {
            var exists = false;
            for (var j = 0; j < soulSel.options.length; j++) {
              if (soulSel.options[j].value === d.soul) { exists = true; break; }
            }
            if (!exists) {
              var opt = document.createElement('option');
              opt.value = d.soul;
              opt.textContent = d.soul;
              soulSel.appendChild(opt);
            }
          }
        } else if (currentEvent === 'error') {
          textSpan.textContent = textSoFar ? textSoFar + '\n\u274c ' + (d.error || 'Stream error') : '\u274c ' + (d.error || 'Stream error');
          if (statusEl) statusEl.textContent = 'Error';
        }
      }
    }

    if (!streamDone && textSoFar) {
      textSpan.textContent = textSoFar;
    } else if (!streamDone && !textSoFar) {
      textSpan.textContent = '\u274c No response received';
      if (statusEl) statusEl.textContent = 'Error';
    }

  } catch (err) {
    textSpan.textContent = textSoFar ? textSoFar + '\n\u274c ' + err.message : '\u274c Connection error: ' + err.message;
    if (statusEl) statusEl.textContent = 'Offline';
  }

  if (btn) btn.disabled = false;
  container.scrollTop = container.scrollHeight;
};

(function _initChatWorlds() {
  fetch('/api/v1/templates')
  .then(function(r) { return r.json(); })
  .then(function(templates) {
    var sel = document.getElementById('chat-world');
    if (!sel) return;
    sel.innerHTML = '';
    (templates.templates || templates || []).forEach(function(t) {
      var opt = document.createElement('option');
      opt.value = t.name;
      opt.textContent = t.name + ' (' + t.souls + ' souls)';
      sel.appendChild(opt);
    });
  })
  .catch(function() {});
  window.clearChat();
})();

</script>
